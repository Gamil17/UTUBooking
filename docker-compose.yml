# UTUBooking — local development stack
# Usage:
#   docker compose up -d            — start everything
#   docker compose up -d postgres redis  — infra only
#   docker compose logs -f auth-service  — tail one service
#   docker compose down -v           — stop + remove volumes
#
# Services exposed on host:
#   nginx gateway  → http://localhost:80   (routes /api/v1/*)
#   postgres       → localhost:5432
#   redis          → localhost:6379
#   Each microservice also exposed directly on its own port for debugging

version: "3.9"

# ── Shared environment loaded from backend/.env ────────────────────────────────
x-common-env: &common-env
  env_file: ./backend/.env
  NODE_ENV: development

# ── Shared restart / healthcheck defaults ─────────────────────────────────────
x-service-defaults: &service-defaults
  platform: linux/amd64
  restart: unless-stopped
  networks:
    - utu-net

services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    <<: *service-defaults
    environment:
      POSTGRES_DB:       utu_booking
      POSTGRES_USER:     utu_user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U utu_user -d utu_booking"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    <<: *service-defaults
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Run migrations before any service starts ──────────────────────────────────

  migrate:
    image: node:22-alpine
    <<: *service-defaults
    env_file: ./backend/.env
    working_dir: /app
    volumes:
      - ./backend:/app
    command: >
      sh -c "npm install --prefix /app && npx node-pg-migrate up"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"  # run once and exit

  # ── Microservices ─────────────────────────────────────────────────────────────

  auth-service:
    image: node:22-alpine
    <<: *service-defaults
    env_file: ./backend/.env
    environment:
      <<: *common-env
      PORT: 3001
      NODE_PATH: /app/node_modules
    working_dir: /app
    volumes:
      - ./backend/services/auth:/app
      - ./backend/shared:/shared
    command: sh -c "npm install && node server.js"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  hotel-service:
    image: node:22-alpine
    <<: *service-defaults
    env_file: ./backend/.env
    environment:
      <<: *common-env
      PORT: 3003
      NODE_PATH: /app/node_modules
    working_dir: /app
    volumes:
      - ./backend/hotel-service:/app
      - ./backend/adapters:/app/../adapters  # shared adapters
    command: sh -c "npm install && node server.js"
    ports:
      - "3003:3003"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  flight-service:
    image: node:22-alpine
    <<: *service-defaults
    env_file: ./backend/.env
    environment:
      <<: *common-env
      PORT: 3004
      NODE_PATH: /app/node_modules
    working_dir: /app
    volumes:
      - ./backend/services/flight:/app
      - ./backend/adapters:/app/../adapters
    command: sh -c "npm install && node server.js"
    ports:
      - "3004:3004"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  car-service:
    image: node:22-alpine
    <<: *service-defaults
    env_file: ./backend/.env
    environment:
      <<: *common-env
      PORT: 3005
      NODE_PATH: /app/node_modules
    working_dir: /app
    volumes:
      - ./backend/services/car:/app
      - ./backend/adapters:/app/../adapters
    command: sh -c "npm install && node server.js"
    ports:
      - "3005:3005"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3005/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  booking-service:
    image: node:22-alpine
    <<: *service-defaults
    env_file: ./backend/.env
    environment:
      <<: *common-env
      PORT: 3006
    working_dir: /app
    volumes:
      - ./backend/services/booking:/app
    command: sh -c "npm install && node server.js"
    ports:
      - "3006:3006"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3006/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    image: node:22-alpine
    <<: *service-defaults
    env_file: ./backend/.env
    environment:
      <<: *common-env
      PORT: 3007
      NODE_PATH: /app/node_modules
    working_dir: /app
    volumes:
      - ./backend/services/payment:/app
      - ./backend/shared:/shared
    command: sh -c "npm install && node server.js"
    ports:
      - "3007:3007"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3007/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  loyalty-service:
    image: node:22-alpine
    <<: *service-defaults
    env_file: ./backend/.env
    environment:
      <<: *common-env
      PORT: 3008
    working_dir: /app
    volumes:
      - ./backend/services/loyalty:/app
    command: sh -c "npm install && node server.js"
    ports:
      - "3008:3008"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3008/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  whitelabel-service:
    image: node:22-alpine
    <<: *service-defaults
    env_file: ./backend/.env
    environment:
      <<: *common-env
      PORT: 3009
      # ADMIN_SECRET: set in backend/.env — required for POST/GET /api/admin/tenants
      # READ_DATABASE_URL: set in backend/.env — read replica for analytics queries
    working_dir: /app
    volumes:
      - ./backend/services/whitelabel:/app
    command: sh -c "npm install && node server.js"
    ports:
      - "3009:3009"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3009/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  wallet-service:
    image: node:22-alpine
    <<: *service-defaults
    env_file: ./backend/.env
    environment:
      <<: *common-env
      PORT: 3010
      # EXCHANGERATE_API_KEY: set in backend/.env
    working_dir: /app
    volumes:
      - ./backend/services/wallet:/app
    command: sh -c "npm install && node src/index.js"
    ports:
      - "3010:3010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3010/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  pricing-service:
    image: node:22-alpine
    <<: *service-defaults
    env_file: ./backend/.env
    environment:
      <<: *common-env
      PORT: 3011
      # ANTHROPIC_API_KEY: set in backend/.env — required for AI pricing recommendations
      # INTERNAL_API_SECRET: set in backend/.env — shared with Lambda cron + frontend push
      # FRONTEND_URL: set in backend/.env — for demand push alerts (e.g. http://frontend:3000)
      # HOTEL_CAPACITY: set in backend/.env — default rooms per hotel (default 50)
    working_dir: /app
    volumes:
      - ./backend/services/pricing:/app
    command: sh -c "npm install && node src/index.js"
    ports:
      - "3011:3011"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3011/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    image: node:22-alpine
    <<: *service-defaults
    env_file: ./backend/.env
    environment:
      <<: *common-env
      PORT: 3002
      NODE_PATH: /app/node_modules
      # SENDGRID_API_KEY: set in backend/.env
      # SENDGRID_FROM_EMAIL: set in backend/.env
      # SENDGRID_WEBHOOK_SECRET: set in backend/.env
      # INTERNAL_HOTEL_SERVICE_URL: set in backend/.env (default http://hotel-service:3003)
      # INTERNAL_FLIGHT_SERVICE_URL: set in backend/.env (default http://flight-service:3004)
      # INTERNAL_CAR_SERVICE_URL: set in backend/.env (default http://car-service:3005)
    working_dir: /app
    volumes:
      - ./backend/services/notification:/app
      - ./backend/shared:/shared
    command: sh -c "npm install && node server.js"
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  admin-service:
    image: node:22-alpine
    <<: *service-defaults
    env_file: ./backend/.env
    environment:
      <<: *common-env
      PORT: 3012
      ADMIN_PORT: 3012
    working_dir: /app
    volumes:
      - ./backend/services/admin:/app
    command: sh -c "npm install && node server.js"
    ports:
      - "3012:3012"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3012/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Gateway (nginx) ───────────────────────────────────────────────────────

  gateway:
    image: nginx:alpine
    <<: *service-defaults
    ports:
      - "80:80"
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - hotel-service
      - flight-service
      - car-service
      - booking-service
      - payment-service
      - loyalty-service
      - whitelabel-service
      - wallet-service
      - pricing-service
      - notification-service

# ── Volumes ───────────────────────────────────────────────────────────────────

volumes:
  postgres-data:
  redis-data:

# ── Networks ──────────────────────────────────────────────────────────────────

networks:
  utu-net:
    driver: bridge
