# UTUBooking API Gateway — nginx reverse proxy
# Routes all /api/v1/* traffic to the correct microservice.
# Webhook endpoints preserve the raw body (no body buffering) for HMAC verification.
#
# Internal Docker DNS names match docker-compose service names.

# ── Rate limiting zones ─────────────────────────────────────────────────────────
# Auth endpoints: 10 req/min per IP (brute-force protection)
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=10r/m;
# Search endpoints: 200 req/min per IP (search-heavy traffic allowed)
limit_req_zone $binary_remote_addr zone=api_search:10m  rate=200r/m;
# All other API endpoints: 100 req/min per IP
limit_req_zone $binary_remote_addr zone=api_general:10m rate=100r/m;

upstream auth_service        { server auth-service:3001;        keepalive 16; }
upstream hotel_service       { server hotel-service:3003;       keepalive 16; }
upstream flight_service      { server flight-service:3004;      keepalive 16; }
upstream car_service         { server car-service:3005;         keepalive 16; }
upstream booking_service     { server booking-service:3006;     keepalive 16; }
upstream payment_service     { server payment-service:3007;     keepalive 16; }
upstream loyalty_service     { server loyalty-service:3008;     keepalive 16; }
upstream whitelabel_service  { server whitelabel-service:3009;  keepalive 16; }
upstream wallet_service      { server wallet-service:3010;      keepalive 16; }
upstream pricing_service        { server pricing-service:3011;        keepalive 16; }
upstream notification_service   { server notification-service:3002;   keepalive 16; }

server {
    listen 80;
    server_name _;

    # Use Docker's internal DNS so upstream hostnames resolve dynamically
    # (prevents nginx from failing at startup if a service hasn't started yet)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Global settings ────────────────────────────────────────────────────────
    client_max_body_size 1m;
    proxy_http_version   1.1;
    proxy_set_header     Connection       "";          # enable keepalive
    proxy_set_header     Host             $host;
    proxy_set_header     X-Real-IP        $remote_addr;
    proxy_set_header     X-Forwarded-For  $proxy_add_x_forwarded_for;
    proxy_set_header     X-Forwarded-Proto $scheme;
    proxy_set_header     X-Request-ID      $request_id;
    proxy_read_timeout   30s;
    proxy_connect_timeout 5s;

    # ── Security headers ───────────────────────────────────────────────────────
    # Prevents clickjacking
    add_header X-Frame-Options "DENY" always;
    # Prevents MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Legacy XSS filter for older browsers
    add_header X-XSS-Protection "1; mode=block" always;
    # Controls referrer information
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS: force HTTPS for 1 year — enabled once ALB/CloudFront TLS is confirmed
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # Restricts browser feature access
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Content Security Policy — API gateway serves JSON only, no scripts/styles
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
    # Remove nginx version from error pages
    server_tokens off;

    # ── Health check ───────────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 '{"status":"ok","gateway":"nginx"}';
        add_header Content-Type application/json;
    }

    # ── Nginx metrics stub (for prometheus nginx-exporter — internal only) ─────
    location /nginx_status {
        stub_status on;
        access_log  off;
        allow       172.0.0.0/8;    # Docker bridge network only
        allow       10.0.0.0/8;     # ECS VPC internal
        deny        all;
    }

    # ── Auth service ── /api/v1/auth/* ────────────────────────────────────────
    location /api/v1/auth/ {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://auth_service/api/v1/auth/;
    }

    # ── Hotel service ── /api/v1/hotels/* ────────────────────────────────────
    location /api/v1/hotels/ {
        limit_req zone=api_search burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://hotel_service/api/v1/hotels/;
    }

    # ── Flight service ── /api/v1/flights/* ──────────────────────────────────
    location /api/v1/flights/ {
        limit_req zone=api_search burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://flight_service/api/v1/flights/;
    }

    # ── Car service ── /api/v1/cars/* ────────────────────────────────────────
    location /api/v1/cars/ {
        limit_req zone=api_search burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://car_service/api/v1/cars/;
    }

    # ── Booking service ── /api/v1/bookings/* ────────────────────────────────
    location /api/v1/bookings/ {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://booking_service/api/v1/bookings/;
    }

    # ── Loyalty service ── /api/v1/loyalty/* ─────────────────────────────────
    location /api/v1/loyalty/ {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://loyalty_service/api/v1/loyalty/;
    }

    # ── Payment service — regular endpoints ───────────────────────────────────
    location /api/payments/ {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://payment_service/api/payments/;
    }

    # ── Notification admin — /api/admin/notifications/* ─────────────────────
    location /api/admin/notifications/ {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://notification_service;
    }

    # ── SendGrid webhook — /api/v1/notifications/webhook/sendgrid ────────────
    location /api/v1/notifications/webhook/sendgrid {
        proxy_pass      http://notification_service;
        proxy_buffering off;   # raw body required for signature verification
    }

    # ── White-label admin — /api/admin/tenants/* ─────────────────────────────
    # Internal-only: requires Bearer ADMIN_SECRET. Not rate-limited (ops tooling).
    location /api/admin/tenants/ {
        allow       172.0.0.0/8;    # Docker bridge network only
        allow       10.0.0.0/8;     # ECS VPC internal (ops bastion host)
        deny        all;
        proxy_pass http://whitelabel_service/api/admin/tenants/;
    }

    # ── White-label public — /api/tenants/* ──────────────────────────────────
    # Called by Next.js edge middleware for tenant resolution (by-domain lookup).
    location /api/tenants/ {
        limit_req zone=api_general burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://whitelabel_service/api/tenants/;
    }

    # ── Wallet service ── /api/v1/wallet/* ───────────────────────────────────
    location /api/v1/wallet/ {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://wallet_service/api/v1/wallet/;
    }

    # ── Pricing service ── /api/v1/pricing/* ─────────────────────────────────
    location /api/v1/pricing/ {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://pricing_service/api/v1/pricing/;
    }

    # ── Payment webhooks — raw body passthrough (critical for HMAC) ───────────
    # proxy_request_buffering off preserves raw bytes for signature verification.
    # Webhooks are not rate-limited (provider IPs send bursts during reconciliation).
    location ~ ^/api/payments/(webhook|mada/webhook|stripe/webhook)$ {
        proxy_pass               http://payment_service;
        proxy_request_buffering  off;
        proxy_buffering          off;
    }

    # ── CORS preflight ─────────────────────────────────────────────────────────
    location / {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin  'https://utubooking.com';
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, Accept, X-Request-ID';
            add_header Access-Control-Max-Age       86400;
            add_header Vary                         'Origin';
            return 204;
        }
        return 404 '{"error":"NOT_FOUND"}';
        add_header Content-Type application/json;
    }
}
