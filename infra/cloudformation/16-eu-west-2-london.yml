AWSTemplateFormatVersion: '2010-09-09'
Description: >
  UTUBooking Phase 8 — UK Region (eu-west-2 / London)
  Data sovereignty: UK GDPR post-Brexit — all GB user data stays in UK territory.
  Full primary RDS (not a read replica) — UK data must NOT cross to EU post-Brexit.
  Serves: GB (United Kingdom)
  Pattern: mirrors 11-eu-west-1-region.yml with standalone primary RDS.

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, staging]

  DBMasterPassword:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /utu/uk/db/master-password
    NoEcho: true

  DBMasterUsername:
    Type: String
    Default: utu_user

  ECRRepository:
    Type: String
    Default: "123456789.dkr.ecr.me-south-1.amazonaws.com/utu-booking"
    Description: ECR repo in primary region — images pulled cross-region

  ImageTag:
    Type: String
    Default: latest

  CertificateArn:
    Type: String
    Description: ACM certificate for api-uk.utubooking.com (must be in eu-west-2)

  DBInstanceClass:
    Type: String
    Default: db.r7g.large
    AllowedValues: [db.r7g.large, db.r7g.xlarge, db.r7g.2xlarge]
    Description: r7g.large for launch; scale up at 40% CPU sustained

Mappings:
  AZs:
    eu-west-2:
      AZ1: eu-west-2a
      AZ2: eu-west-2b

Resources:

  # ── VPC — 10.4.0.0/16 (10.1=Bahrain, 10.2=Riyadh, 10.3=EU-West-1, 10.4=London) ──
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.4.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - {Key: Name,   Value: utu-eu-west-2-vpc}
        - {Key: Region, Value: eu-west-2}
        - {Key: DataJurisdiction, Value: UK-GDPR}

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.4.1.0/24
      AvailabilityZone: eu-west-2a
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: utu-uk-public-1}]

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.4.2.0/24
      AvailabilityZone: eu-west-2b
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: utu-uk-public-2}]

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.4.10.0/24
      AvailabilityZone: eu-west-2a
      Tags: [{Key: Name, Value: utu-uk-private-1}]

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.4.11.0/24
      AvailabilityZone: eu-west-2b
      Tags: [{Key: Name, Value: utu-uk-private-2}]

  NatEIP:
    Type: AWS::EC2::EIP
    Properties: {Domain: vpc}

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnet1

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties: {VpcId: !Ref VPC}

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PublicSubnet1, RouteTableId: !Ref PublicRouteTable}

  PublicSubnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PublicSubnet2, RouteTableId: !Ref PublicRouteTable}

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties: {VpcId: !Ref VPC}

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PrivateSubnet1, RouteTableId: !Ref PrivateRouteTable}

  PrivateSubnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PrivateSubnet2, RouteTableId: !Ref PrivateRouteTable}

  # ── ALB ─────────────────────────────────────────────────────────────────────
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: UK ALB — HTTPS/HTTP ingress
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - {IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: 0.0.0.0/0}
        - {IpProtocol: tcp, FromPort: 80,  ToPort: 80,  CidrIp: 0.0.0.0/0}

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: utu-uk-alb
      Scheme: internet-facing
      Type: application
      Subnets: [!Ref PublicSubnet1, !Ref PublicSubnet2]
      SecurityGroups: [!Ref ALBSecurityGroup]
      LoadBalancerAttributes:
        - {Key: idle_timeout.timeout_seconds, Value: "60"}
        - {Key: routing.http2.enabled, Value: "true"}
      Tags:
        - {Key: Region, Value: eu-west-2}
        - {Key: DataJurisdiction, Value: UK-GDPR}

  ALBListenerHTTPS:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: "404"
            ContentType: application/json
            MessageBody: '{"error":"Not found"}'

  ALBListenerHTTP:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig: {Protocol: HTTPS, Port: "443", StatusCode: HTTP_301}

  # ── ECS Cluster ─────────────────────────────────────────────────────────────
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: utu-eu-west-2
      ClusterSettings:
        - {Name: containerInsights, Value: enabled}
      CapacityProviders: [FARGATE, FARGATE_SPOT]
      DefaultCapacityProviderStrategy:
        - {CapacityProvider: FARGATE,      Weight: 1, Base: 1}
        - {CapacityProvider: FARGATE_SPOT, Weight: 3}

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: UK ECS tasks
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - {IpProtocol: tcp, FromPort: 3000, ToPort: 3099, SourceSecurityGroupId: !Ref ALBSecurityGroup}

  # ── ElastiCache Redis ────────────────────────────────────────────────────────
  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: UK Redis subnets
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]

  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: UK Redis — ECS access only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - {IpProtocol: tcp, FromPort: 6379, ToPort: 6379, SourceSecurityGroupId: !Ref ECSSecurityGroup}

  RedisCluster:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupDescription: UTUBooking UK Redis
      ReplicationGroupId: utu-uk-redis
      NumNodeGroups: 2               # 2 shards for UK launch; scale to 3 at growth
      ReplicasPerNodeGroup: 1
      CacheNodeType: cache.r7g.large
      Engine: redis
      EngineVersion: "7.1"
      AtRestEncryptionEnabled: true
      TransitEncryptionEnabled: true
      AutomaticFailoverEnabled: true
      MultiAZEnabled: true
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      SecurityGroupIds: [!Ref RedisSecurityGroup]
      SnapshotRetentionLimit: 7
      Tags:
        - {Key: Region, Value: eu-west-2}
        - {Key: DataJurisdiction, Value: UK-GDPR}

  # ── RDS Primary (standalone — UK GDPR data cannot replicate to EU) ──────────
  RDSSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: UK RDS primary subnets
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: UK RDS — ECS access only on 5432
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - {IpProtocol: tcp, FromPort: 5432, ToPort: 5432, SourceSecurityGroupId: !Ref ECSSecurityGroup}

  RDSParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Family: postgres16
      Description: UTUBooking UK PostgreSQL 16
      Parameters:
        shared_preload_libraries: pg_stat_statements
        pg_stat_statements.track: all
        log_min_duration_statement: "1000"
        log_connections: "on"
        max_connections: "200"
        work_mem: "16MB"

  RDSPrimary:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot     # Always snapshot on stack delete
    Properties:
      DBInstanceIdentifier: !Sub utu-db-uk-primary-${Environment}
      DBInstanceClass: !Ref DBInstanceClass
      Engine: postgres
      EngineVersion: "16"
      MasterUsername: !Ref DBMasterUsername
      MasterUserPassword: !Ref DBMasterPassword
      DBName: utu_booking
      DBSubnetGroupName: !Ref RDSSubnetGroup
      DBParameterGroupName: !Ref RDSParameterGroup
      VPCSecurityGroups: [!GetAtt RDSSecurityGroup.GroupId]
      MultiAZ: true              # HA within eu-west-2
      StorageType: gp3
      AllocatedStorage: "100"
      MaxAllocatedStorage: 500   # Autoscaling up to 500 GB
      StorageEncrypted: true
      EnablePerformanceInsights: true
      PerformanceInsightsRetentionPeriod: 7
      EnableCloudwatchLogsExports: [postgresql, upgrade]
      BackupRetentionPeriod: 7
      PreferredBackupWindow: "02:00-03:00"     # 2–3 AM UTC (low UK traffic)
      PreferredMaintenanceWindow: "sun:03:00-sun:04:00"
      AutoMinorVersionUpgrade: true
      DeletionProtection: true
      Tags:
        - {Key: Region,          Value: eu-west-2}
        - {Key: DataJurisdiction,Value: UK-GDPR}
        - {Key: Role,            Value: Primary}

  # Read replica in same region for read scaling
  RDSReadReplica:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub utu-db-uk-replica-${Environment}
      DBInstanceClass: !Ref DBInstanceClass
      SourceDBInstanceIdentifier: !Ref RDSPrimary
      AvailabilityZone: eu-west-2b
      DBSubnetGroupName: !Ref RDSSubnetGroup
      VPCSecurityGroups: [!GetAtt RDSSecurityGroup.GroupId]
      StorageEncrypted: true
      EnablePerformanceInsights: true
      PerformanceInsightsRetentionPeriod: 7
      Tags:
        - {Key: Region, Value: eu-west-2}
        - {Key: Role,   Value: ReadReplica}

  # ── ECS Task Execution Role ──────────────────────────────────────────────────
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: utu-uk-ecs-execution-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: ecs-tasks.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/utu-uk
      RetentionInDays: 30

  # ── Hotel Service ─────────────────────────────────────────────────────────────
  HotelTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: utu-uk-hotel
      Port: 3003
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 15

  HotelListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListenerHTTPS
      Priority: 10
      Conditions: [{Field: path-pattern, Values: [/api/v1/hotels/*]}]
      Actions:  [{Type: forward, TargetGroupArn: !Ref HotelTargetGroup}]

  HotelTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: utu-uk-hotel
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: "512"
      Memory: "1024"
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: hotel
          Image: !Sub ${ECRRepository}/hotel-service:${ImageTag}
          PortMappings: [{ContainerPort: 3003}]
          Environment:
            - {Name: NODE_ENV,            Value: production}
            - {Name: REGION,              Value: eu-west-2}
            - {Name: REDIS_CLUSTER_URLS,  Value: !Sub "${RedisCluster.PrimaryEndPoint.Address}:6379"}
            - {Name: DATABASE_URL,        Value: !Sub "postgresql://${DBMasterUsername}:$(DB_PASS)@${RDSPrimary.Endpoint.Address}:5432/utu_booking"}
            - {Name: READ_DATABASE_URL,   Value: !Sub "postgresql://${DBMasterUsername}:$(DB_PASS)@${RDSReadReplica.Endpoint.Address}:5432/utu_booking"}
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: eu-west-2
              awslogs-stream-prefix: hotel

  HotelService:
    Type: AWS::ECS::Service
    DependsOn: HotelListenerRule
    Properties:
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref HotelTaskDef
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
          SecurityGroups: [!Ref ECSSecurityGroup]
      LoadBalancers:
        - ContainerName: hotel
          ContainerPort: 3003
          TargetGroupArn: !Ref HotelTargetGroup

  HotelScaling:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 10
      MinCapacity: 1
      ResourceId: !Sub service/${ECSCluster}/utu-uk-hotel
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  HotelScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: utu-uk-hotel-cpu
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref HotelScaling
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 60.0
        ScaleOutCooldown: 60
        ScaleInCooldown: 300

  # ── Auth Service ──────────────────────────────────────────────────────────────
  AuthTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: utu-uk-auth
      Port: 3001
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckPath: /health

  AuthListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListenerHTTPS
      Priority: 5
      Conditions: [{Field: path-pattern, Values: [/api/auth/*, /api/user/gdpr/*]}]
      Actions:  [{Type: forward, TargetGroupArn: !Ref AuthTargetGroup}]

  AuthTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: utu-uk-auth
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: "256"
      Memory: "512"
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: auth
          Image: !Sub ${ECRRepository}/auth-service:${ImageTag}
          PortMappings: [{ContainerPort: 3001}]
          Environment:
            - {Name: NODE_ENV,          Value: production}
            - {Name: REGION,            Value: eu-west-2}
            - {Name: REDIS_CLUSTER_URLS,Value: !Sub "${RedisCluster.PrimaryEndPoint.Address}:6379"}
            - {Name: DATABASE_URL,      Value: !Sub "postgresql://${DBMasterUsername}:$(DB_PASS)@${RDSPrimary.Endpoint.Address}:5432/utu_booking"}
            - {Name: DPO_EMAIL,         Value: dpo@utubooking.com}
            - {Name: EU_DATA_CONTROLLER,Value: "UTUBooking Ltd, United Kingdom"}
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: eu-west-2
              awslogs-stream-prefix: auth

  AuthService:
    Type: AWS::ECS::Service
    DependsOn: AuthListenerRule
    Properties:
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref AuthTaskDef
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
          SecurityGroups: [!Ref ECSSecurityGroup]
      LoadBalancers:
        - ContainerName: auth
          ContainerPort: 3001
          TargetGroupArn: !Ref AuthTargetGroup

  # ── Health endpoint ────────────────────────────────────────────────────────
  HealthListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListenerHTTPS
      Priority: 1
      Conditions: [{Field: path-pattern, Values: [/health]}]
      Actions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: "200"
            ContentType: application/json
            MessageBody: '{"status":"ok","region":"eu-west-2","jurisdiction":"UK-GDPR"}'

  # ── CloudWatch Alarms ──────────────────────────────────────────────────────
  AlarmALB5xx:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: utu-uk-alb-5xx-rate
      MetricName: HTTPCode_ELB_5XX_Count
      Namespace: AWS/ApplicationELB
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 3
      Threshold: 50
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt ALB.LoadBalancerFullName
      AlarmActions:
        - !Sub arn:aws:sns:eu-west-2:${AWS::AccountId}:utu-uk-alerts
      TreatMissingData: notBreaching

  AlarmRDSLag:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: utu-uk-rds-replica-lag
      MetricName: ReplicaLag
      Namespace: AWS/RDS
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 3
      Threshold: 30
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Ref RDSReadReplica

Outputs:
  ALBDNS:
    Value: !GetAtt ALB.DNSName
    Export: {Name: utu-uk-alb-dns}

  ALBHostedZoneId:
    Value: !GetAtt ALB.CanonicalHostedZoneID
    Export: {Name: utu-uk-alb-hosted-zone}

  ClusterArn:
    Value: !GetAtt ECSCluster.Arn
    Export: {Name: utu-uk-cluster-arn}

  RDSPrimaryEndpoint:
    Value: !GetAtt RDSPrimary.Endpoint.Address
    Description: >
      Set as DATABASE_URL_LONDON in backend/.env and SSM /utu/uk/db/write-url
    Export: {Name: utu-uk-rds-primary-endpoint}

  RDSReadEndpoint:
    Value: !GetAtt RDSReadReplica.Endpoint.Address
    Description: Set as READ_DB_URL_LONDON in backend/.env
    Export: {Name: utu-uk-rds-read-endpoint}

  RedisEndpoint:
    Value: !GetAtt RedisCluster.PrimaryEndPoint.Address
    Export: {Name: utu-uk-redis-endpoint}

  DeployCommand:
    Value: !Sub >-
      aws cloudformation deploy
      --region eu-west-2
      --stack-name utu-uk-${Environment}
      --template-file infra/cloudformation/16-eu-west-2-london.yml
      --capabilities CAPABILITY_NAMED_IAM
      --parameter-overrides Environment=${Environment} CertificateArn=<ACM_ARN>
