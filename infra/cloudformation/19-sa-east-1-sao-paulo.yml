AWSTemplateFormatVersion: '2010-09-09'
Description: >
  UTUBooking Phase 12 — South America Region (sa-east-1 / São Paulo)
  Data sovereignty: LGPD (Lei Geral de Proteção de Dados — Brazil) requires
  data of Brazilian residents to be stored in Brazil or countries with adequate protection.
  Serves: BR, AR, CO, CL, PE, UY and other LATAM markets.
  Full primary RDS — LATAM data stays in sa-east-1.

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, staging]

  DBMasterPassword:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /utu/latam/db/master-password
    NoEcho: true

  DBMasterUsername:
    Type: String
    Default: utu_user

  ECRRepository:
    Type: String
    Default: "123456789.dkr.ecr.me-south-1.amazonaws.com/utu-booking"

  ImageTag:
    Type: String
    Default: latest

  CertificateArn:
    Type: String
    Description: ACM certificate for api-latam.utubooking.com (sa-east-1)

  DBInstanceClass:
    Type: String
    Default: db.r7g.large    # LATAM smaller launch; scale up at growth
    AllowedValues: [db.r7g.large, db.r7g.xlarge, db.r7g.2xlarge]

Mappings:
  AZs:
    sa-east-1:
      AZ1: sa-east-1a
      AZ2: sa-east-1c  # sa-east-1 has AZs a, b, c (b has limited services)

Resources:

  # ── VPC — 10.7.0.0/16 ───────────────────────────────────────────────────────
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.7.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - {Key: Name,            Value: utu-sa-east-1-vpc}
        - {Key: Region,          Value: sa-east-1}
        - {Key: DataJurisdiction,Value: LGPD-BR}

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.7.1.0/24
      AvailabilityZone: sa-east-1a
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: utu-latam-public-1}]

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.7.2.0/24
      AvailabilityZone: sa-east-1c
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: utu-latam-public-2}]

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.7.10.0/24
      AvailabilityZone: sa-east-1a
      Tags: [{Key: Name, Value: utu-latam-private-1}]

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.7.11.0/24
      AvailabilityZone: sa-east-1c
      Tags: [{Key: Name, Value: utu-latam-private-2}]

  NatEIP:
    Type: AWS::EC2::EIP
    Properties: {Domain: vpc}

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnet1

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties: {VpcId: !Ref VPC}

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PublicSubnet1, RouteTableId: !Ref PublicRouteTable}

  PublicSubnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PublicSubnet2, RouteTableId: !Ref PublicRouteTable}

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties: {VpcId: !Ref VPC}

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PrivateSubnet1, RouteTableId: !Ref PrivateRouteTable}

  PrivateSubnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PrivateSubnet2, RouteTableId: !Ref PrivateRouteTable}

  # ── ALB ─────────────────────────────────────────────────────────────────────
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: LATAM ALB — HTTPS/HTTP ingress
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - {IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: 0.0.0.0/0}
        - {IpProtocol: tcp, FromPort: 80,  ToPort: 80,  CidrIp: 0.0.0.0/0}

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: utu-latam-alb
      Scheme: internet-facing
      Type: application
      Subnets: [!Ref PublicSubnet1, !Ref PublicSubnet2]
      SecurityGroups: [!Ref ALBSecurityGroup]
      LoadBalancerAttributes:
        - {Key: idle_timeout.timeout_seconds, Value: "60"}
        - {Key: routing.http2.enabled, Value: "true"}
      Tags:
        - {Key: Region,          Value: sa-east-1}
        - {Key: DataJurisdiction,Value: LGPD-BR}

  ALBListenerHTTPS:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: "404"
            ContentType: application/json
            MessageBody: '{"error":"Not found"}'

  ALBListenerHTTP:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig: {Protocol: HTTPS, Port: "443", StatusCode: HTTP_301}

  # ── ECS Cluster ─────────────────────────────────────────────────────────────
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: utu-sa-east-1
      ClusterSettings:
        - {Name: containerInsights, Value: enabled}
      CapacityProviders: [FARGATE, FARGATE_SPOT]
      DefaultCapacityProviderStrategy:
        - {CapacityProvider: FARGATE,      Weight: 1, Base: 1}
        - {CapacityProvider: FARGATE_SPOT, Weight: 3}

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: LATAM ECS tasks
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - {IpProtocol: tcp, FromPort: 3000, ToPort: 3099, SourceSecurityGroupId: !Ref ALBSecurityGroup}

  # ── ElastiCache Redis ────────────────────────────────────────────────────────
  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: LATAM Redis subnets
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]

  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: LATAM Redis — ECS access only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - {IpProtocol: tcp, FromPort: 6379, ToPort: 6379, SourceSecurityGroupId: !Ref ECSSecurityGroup}

  RedisCluster:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupDescription: UTUBooking LATAM Redis
      ReplicationGroupId: utu-latam-redis
      NumNodeGroups: 2
      ReplicasPerNodeGroup: 1
      CacheNodeType: cache.r7g.large
      Engine: redis
      EngineVersion: "7.1"
      AtRestEncryptionEnabled: true
      TransitEncryptionEnabled: true
      AutomaticFailoverEnabled: true
      MultiAZEnabled: true
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      SecurityGroupIds: [!Ref RedisSecurityGroup]
      SnapshotRetentionLimit: 7
      Tags:
        - {Key: Region,          Value: sa-east-1}
        - {Key: DataJurisdiction,Value: LGPD-BR}

  # ── RDS Primary ──────────────────────────────────────────────────────────────
  RDSSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: LATAM RDS subnets
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: LATAM RDS — ECS only on 5432
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - {IpProtocol: tcp, FromPort: 5432, ToPort: 5432, SourceSecurityGroupId: !Ref ECSSecurityGroup}

  RDSParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Family: postgres16
      Description: UTUBooking LATAM PostgreSQL 16
      Parameters:
        shared_preload_libraries: pg_stat_statements
        pg_stat_statements.track: all
        log_min_duration_statement: "1000"
        max_connections: "200"
        work_mem: "16MB"
        lc_messages: "pt_BR.UTF-8"   # Brazilian Portuguese locale for system messages

  RDSPrimary:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub utu-db-latam-primary-${Environment}
      DBInstanceClass: !Ref DBInstanceClass
      Engine: postgres
      EngineVersion: "16"
      MasterUsername: !Ref DBMasterUsername
      MasterUserPassword: !Ref DBMasterPassword
      DBName: utu_booking
      DBSubnetGroupName: !Ref RDSSubnetGroup
      DBParameterGroupName: !Ref RDSParameterGroup
      VPCSecurityGroups: [!GetAtt RDSSecurityGroup.GroupId]
      MultiAZ: true
      StorageType: gp3
      AllocatedStorage: "100"
      MaxAllocatedStorage: 500
      StorageEncrypted: true
      EnablePerformanceInsights: true
      PerformanceInsightsRetentionPeriod: 7
      EnableCloudwatchLogsExports: [postgresql, upgrade]
      BackupRetentionPeriod: 7
      PreferredBackupWindow: "07:00-08:00"    # 4–5 AM BRT (off-peak)
      DeletionProtection: true
      Tags:
        - {Key: Region,          Value: sa-east-1}
        - {Key: DataJurisdiction,Value: LGPD-BR}
        - {Key: Role,            Value: Primary}

  RDSReadReplica:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub utu-db-latam-replica-${Environment}
      DBInstanceClass: !Ref DBInstanceClass
      SourceDBInstanceIdentifier: !Ref RDSPrimary
      AvailabilityZone: sa-east-1c
      DBSubnetGroupName: !Ref RDSSubnetGroup
      VPCSecurityGroups: [!GetAtt RDSSecurityGroup.GroupId]
      StorageEncrypted: true
      Tags:
        - {Key: Region, Value: sa-east-1}
        - {Key: Role,   Value: ReadReplica}

  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: utu-latam-ecs-execution-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: ecs-tasks.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/utu-latam
      RetentionInDays: 30

  HotelTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: utu-latam-hotel
      Port: 3003
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckPath: /health

  HotelListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListenerHTTPS
      Priority: 10
      Conditions: [{Field: path-pattern, Values: [/api/v1/hotels/*]}]
      Actions:  [{Type: forward, TargetGroupArn: !Ref HotelTargetGroup}]

  HotelTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: utu-latam-hotel
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: "512"
      Memory: "1024"
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: hotel
          Image: !Sub ${ECRRepository}/hotel-service:${ImageTag}
          PortMappings: [{ContainerPort: 3003}]
          Environment:
            - {Name: NODE_ENV,          Value: production}
            - {Name: REGION,            Value: sa-east-1}
            - {Name: REDIS_CLUSTER_URLS,Value: !Sub "${RedisCluster.PrimaryEndPoint.Address}:6379"}
            - {Name: DATABASE_URL,      Value: !Sub "postgresql://${DBMasterUsername}:$(DB_PASS)@${RDSPrimary.Endpoint.Address}:5432/utu_booking"}
            - {Name: READ_DATABASE_URL, Value: !Sub "postgresql://${DBMasterUsername}:$(DB_PASS)@${RDSReadReplica.Endpoint.Address}:5432/utu_booking"}
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: sa-east-1
              awslogs-stream-prefix: hotel

  HotelService:
    Type: AWS::ECS::Service
    DependsOn: HotelListenerRule
    Properties:
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref HotelTaskDef
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
          SecurityGroups: [!Ref ECSSecurityGroup]
      LoadBalancers:
        - ContainerName: hotel
          ContainerPort: 3003
          TargetGroupArn: !Ref HotelTargetGroup

  HotelScaling:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 10
      MinCapacity: 1
      ResourceId: !Sub service/${ECSCluster}/utu-latam-hotel
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  HotelScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: utu-latam-hotel-cpu
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref HotelScaling
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 60.0
        ScaleOutCooldown: 60
        ScaleInCooldown: 300

  HealthListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListenerHTTPS
      Priority: 1
      Conditions: [{Field: path-pattern, Values: [/health]}]
      Actions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: "200"
            ContentType: application/json
            MessageBody: '{"status":"ok","region":"sa-east-1","jurisdiction":"LGPD-BR"}'

  AlarmALB5xx:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: utu-latam-alb-5xx-rate
      MetricName: HTTPCode_ELB_5XX_Count
      Namespace: AWS/ApplicationELB
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 3
      Threshold: 50
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt ALB.LoadBalancerFullName
      AlarmActions:
        - !Sub arn:aws:sns:sa-east-1:${AWS::AccountId}:utu-latam-alerts
      TreatMissingData: notBreaching

Outputs:
  ALBDNS:
    Value: !GetAtt ALB.DNSName
    Export: {Name: utu-latam-alb-dns}

  ALBHostedZoneId:
    Value: !GetAtt ALB.CanonicalHostedZoneID
    Export: {Name: utu-latam-alb-hosted-zone}

  RDSPrimaryEndpoint:
    Value: !GetAtt RDSPrimary.Endpoint.Address
    Description: Set as DATABASE_URL_SAO_PAULO in backend/.env
    Export: {Name: utu-latam-rds-primary}

  RDSReadEndpoint:
    Value: !GetAtt RDSReadReplica.Endpoint.Address
    Description: Set as READ_DB_URL_SAO_PAULO in backend/.env
    Export: {Name: utu-latam-rds-read}

  RedisEndpoint:
    Value: !GetAtt RedisCluster.PrimaryEndPoint.Address
    Export: {Name: utu-latam-redis-endpoint}

  DeployCommand:
    Value: !Sub >-
      aws cloudformation deploy
      --region sa-east-1
      --stack-name utu-latam-${Environment}
      --template-file infra/cloudformation/19-sa-east-1-sao-paulo.yml
      --capabilities CAPABILITY_NAMED_IAM
      --parameter-overrides Environment=${Environment} CertificateArn=<ACM_ARN_SA>
