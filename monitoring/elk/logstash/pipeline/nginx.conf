# UTUBooking Phase 4 — Logstash Pipeline: nginx access logs
# Input: Filebeat (port 5044, tag "nginx")
# Output: Elasticsearch index logs-nginx-YYYY.MM.dd

input {
  beats {
    port => 5044
    tags => ["nginx"]
  }
}

filter {
  if "nginx" in [tags] {

    # Parse nginx combined log format + UTUBooking custom fields:
    # $remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent
    # "$http_referer" "$http_user_agent" $request_time $upstream_response_time
    # $request_id $trace_id
    grok {
      match => {
        "message" => [
          '%{IPORHOST:client_ip} - %{DATA:remote_user} \[%{HTTPDATE:timestamp}\] "%{WORD:http_method} %{DATA:request_uri} HTTP/%{NUMBER:http_version}" %{NUMBER:status_code:int} %{NUMBER:bytes_sent:int} "%{DATA:referrer}" "%{DATA:user_agent}" %{NUMBER:request_time_s:float} %{DATA:upstream_time} %{DATA:request_id} %{DATA:trace_id}',
          '%{IPORHOST:client_ip} - %{DATA:remote_user} \[%{HTTPDATE:timestamp}\] "%{WORD:http_method} %{DATA:request_uri} HTTP/%{NUMBER:http_version}" %{NUMBER:status_code:int} %{NUMBER:bytes_sent:int} "%{DATA:referrer}" "%{DATA:user_agent}"'
        ]
      }
      tag_on_failure => ["_grokparsefailure_nginx"]
    }

    # Convert timestamp to @timestamp
    date {
      match => ["timestamp", "dd/MMM/yyyy:HH:mm:ss Z"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }

    # Convert upstream_time to float (may be "-" for cache hits)
    if [upstream_time] != "-" {
      mutate {
        convert => { "upstream_time" => "float" }
        rename  => { "upstream_time" => "upstream_response_time_s" }
      }
    }

    # Classify status code groups
    if [status_code] {
      if [status_code] >= 500 {
        mutate { add_field => { "status_group" => "5xx" } }
      } else if [status_code] >= 400 {
        mutate { add_field => { "status_group" => "4xx" } }
      } else if [status_code] >= 300 {
        mutate { add_field => { "status_group" => "3xx" } }
      } else {
        mutate { add_field => { "status_group" => "2xx" } }
      }
    }

    # Extract service name from URI path: /api/v1/{service}/...
    grok {
      match => { "request_uri" => "^/api/v1/%{WORD:api_service}" }
      tag_on_failure => []
    }

    # Parse user agent for bot detection
    useragent {
      source => "user_agent"
      target => "ua"
    }

    # GeoIP from client IP (useful for N.Africa geo routing validation)
    geoip {
      source => "client_ip"
      target => "geoip"
      tag_on_failure => []
    }

    mutate {
      remove_field => ["host", "agent", "ecs", "input", "log"]
      add_field => { "log_type" => "nginx-access" }
    }
  }
}

output {
  if "nginx" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "logs-nginx-%{+YYYY.MM.dd}"
      template_name => "logs-nginx"
      template_overwrite => false
    }
  }
}
