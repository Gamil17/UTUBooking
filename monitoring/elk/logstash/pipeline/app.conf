# UTUBooking Phase 4 — Logstash Pipeline: application JSON logs
# Input: Filebeat (port 5044, tag "app")
# All services log structured JSON via Winston — no grok needed.
# Output: Elasticsearch index logs-app-YYYY.MM.dd

input {
  beats {
    port => 5044
    tags => ["app"]
  }
}

filter {
  if "app" in [tags] {

    # All services use Winston JSON format:
    # { "level": "info", "message": "...", "service": "booking", "traceId": "...",
    #   "requestId": "...", "durationMs": 45, "statusCode": 200, "timestamp": "..." }
    json {
      source => "message"
      target => "app"
      tag_on_failure => ["_jsonparsefailure_app"]
    }

    # Promote key fields to top level for Kibana dashboards
    if [app][timestamp] {
      date {
        match => ["[app][timestamp]", "ISO8601"]
        target => "@timestamp"
      }
    }

    mutate {
      rename => {
        "[app][level]"      => "log_level"
        "[app][message]"    => "log_message"
        "[app][service]"    => "service"
        "[app][traceId]"    => "trace_id"
        "[app][requestId]"  => "request_id"
        "[app][durationMs]" => "duration_ms"
        "[app][statusCode]" => "status_code"
        "[app][countryCode]" => "country_code"
        "[app][shard]"      => "db_shard"
        "[app][userId]"     => "user_id"
        "[app][error]"      => "error_message"
        "[app][stack]"      => "error_stack"
      }
    }

    # Tag slow requests (>500ms) and very slow (>2s) for alerting
    if [duration_ms] {
      if [duration_ms] > 2000 {
        mutate { add_tag => ["slow_critical"] }
      } else if [duration_ms] > 500 {
        mutate { add_tag => ["slow_warning"] }
      }
    }

    # Tag errors for easy filtering
    if [log_level] == "error" {
      mutate { add_tag => ["error"] }
    }

    mutate {
      add_field => { "log_type" => "app" }
      remove_field => ["app", "host", "agent", "ecs", "input", "log", "message"]
    }
  }
}

output {
  if "app" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "logs-app-%{+YYYY.MM.dd}"
      template_name => "logs-app"
      template_overwrite => false
    }

    # Mirror critical errors to a separate index for PagerDuty webhook
    if "error" in [tags] {
      elasticsearch {
        hosts => ["http://elasticsearch:9200"]
        index => "logs-errors-%{+YYYY.MM.dd}"
      }
    }
  }
}
