groups:

  # ── SLO: Availability & Error Rate ─────────────────────────────────────────
  - name: utubooking-slo-errors
    rules:
      - alert: HighErrorRate
        expr: |
          (
            rate(http_request_duration_seconds_count{status_code=~"5.."}[5m])
            /
            rate(http_request_duration_seconds_count[5m])
          ) > 0.01
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 1%) on service {{ $labels.service }}"

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service down: {{ $labels.job }}"
          description: "{{ $labels.job }} has been unreachable for 1 minute"

  # ── SLO: Latency ────────────────────────────────────────────────────────────
  - name: utubooking-slo-latency
    rules:
      - alert: HighLatencyP99
        expr: |
          histogram_quantile(
            0.99,
            rate(http_request_duration_seconds_bucket[5m])
          ) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "P99 latency > 500ms on {{ $labels.service }}"
          description: "P99 latency is {{ $value | humanizeDuration }} on service {{ $labels.service }}"

      - alert: HighLatencyP95Critical
        expr: |
          histogram_quantile(
            0.95,
            rate(http_request_duration_seconds_bucket[5m])
          ) > 1.0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "P95 latency > 1s on {{ $labels.service }}"
          description: "P95 latency is {{ $value | humanizeDuration }} on service {{ $labels.service }}"

  # ── Database ─────────────────────────────────────────────────────────────────
  - name: utubooking-database
    rules:
      - alert: DatabaseConnectionsHigh
        expr: pg_stat_activity_count > 90
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connection count high"
          description: "{{ $value }} active connections (threshold: 90)"

      - alert: DatabaseConnectionsCritical
        expr: pg_stat_activity_count > 110
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL connections near limit"
          description: "{{ $value }} active connections — pool exhaustion imminent"

      - alert: DatabaseReplicationLag
        expr: pg_replication_lag > 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL replication lag > 30s"
          description: "Read replica lag is {{ $value }}s — reads may be stale"

  # ── Redis ────────────────────────────────────────────────────────────────────
  - name: utubooking-redis
    rules:
      - alert: RedisMemoryHigh
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage > 85%"
          description: "Redis is using {{ $value | humanizePercentage }} of max memory"

      - alert: RedisMemoryCritical
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.95
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis memory usage > 95% — evictions likely"
          description: "Redis memory at {{ $value | humanizePercentage }}"

      - alert: RedisDown
        expr: redis_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis instance has been unreachable for 30s — all services will fail"

  # ── Hajj Season Peak ─────────────────────────────────────────────────────────
  - name: utubooking-hajj-peak
    rules:
      - alert: HotelSearchRateSpike
        expr: |
          rate(http_request_duration_seconds_count{service="hotel",route=~".*search.*"}[5m]) > 500
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Hotel search rate spike — Hajj peak traffic detected"
          description: "Hotel search rate is {{ $value | humanize }} req/s — consider pre-scaling"

  # ── Infrastructure: Backup, ECS, Redis Cluster ───────────────────────────────
  - name: utubooking-infrastructure
    rules:
      # Backup staleness — fires if no successful backup in 25 hours
      - alert: BackupStale
        expr: time() - backup_last_success_timestamp > 90000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL backup is stale (>25h)"
          description: "No successful S3 backup recorded in 25+ hours. Check pg-backup ECS scheduled task."

      # ECS minimum task count — fires if any service drops below 2
      - alert: ECSTaskCountLow
        expr: aws_ecs_service_running_task_count < 2
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "ECS service {{ $labels.service_name }} has fewer than 2 running tasks"
          description: "{{ $labels.service_name }} is running {{ $value }} task(s) — below minimum HA threshold of 2"

      # Redis cluster shard failure — fires if any shard is not reachable
      - alert: RedisClusterShardFail
        expr: redis_cluster_slots_assigned < 16384
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis cluster has unassigned slots — shard failure"
          description: "Only {{ $value }}/16384 cluster slots are assigned. One or more shards may be down."
