# UTUBooking - Frontend CI/CD
# Builds Next.js and deploys to AWS Amplify (me-south-1 Bahrain, nearest GCC PoP)
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID              - IAM user with Amplify deploy permissions
#   AWS_SECRET_ACCESS_KEY
#   AMPLIFY_APP_ID                 - e.g. d1a2b3c4e5f6g7 (from Amplify console)
#   NEXT_PUBLIC_API_URL            - https://api.utubooking.com/api/v1
#   NEXT_PUBLIC_STRIPE_PUBLIC_KEY  - Stripe publishable key (pk_live_...)
#   NEXT_PUBLIC_MOYASAR_PUBLIC_KEY - Moyasar publishable key
#
# Required GitHub Variables (non-secret):
#   AWS_REGION                     - me-south-1
#   AMPLIFY_BRANCH                 - main
#
# Phase 3 additions:
#   CLOUDFRONT_DISTRIBUTION_ID     - CloudFront distribution ID (from stack 05-cloudfront)

name: Deploy Frontend - AWS Amplify (me-south-1)

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:  # allow manual trigger

env:
  AWS_REGION:    me-south-1
  NODE_VERSION:  '22'

# ── Jobs ────────────────────────────────────────────────────────────────────────

jobs:

  # ── 1. Build Next.js ──────────────────────────────────────────────────────────
  build:
    name: Build Next.js
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production
          # Public env vars baked into the bundle at build time
          NEXT_PUBLIC_API_URL:              ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_STRIPE_PUBLIC_KEY:    ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLIC_KEY }}
          NEXT_PUBLIC_MOYASAR_PUBLIC_KEY:   ${{ secrets.NEXT_PUBLIC_MOYASAR_PUBLIC_KEY }}

      # Package the Next.js output for Amplify manual deployment
      # Amplify expects the build output zipped from the project root
      - name: Package build artefact
        working-directory: frontend
        run: |
          zip -r ../frontend-build.zip .next public package.json next.config.ts

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: frontend-build.zip
          retention-days: 7

  # ── 2. Deploy to AWS Amplify ──────────────────────────────────────────────────
  deploy:
    name: Deploy to Amplify
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Download build artefact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # Create a manual deployment slot in Amplify and upload the zip
      - name: Create Amplify deployment
        id: amplify-deployment
        env:
          AMPLIFY_APP_ID:    ${{ secrets.AMPLIFY_APP_ID }}
          AMPLIFY_BRANCH:    ${{ vars.AMPLIFY_BRANCH || 'main' }}
        run: |
          RESULT=$(aws amplify create-deployment \
            --app-id "${AMPLIFY_APP_ID}" \
            --branch-name "${AMPLIFY_BRANCH}" \
            --output json)

          JOB_ID=$(echo "$RESULT" | jq -r '.jobId')
          UPLOAD_URL=$(echo "$RESULT" | jq -r '.zipUploadUrl')

          echo "job_id=${JOB_ID}" >> $GITHUB_OUTPUT
          echo "upload_url=${UPLOAD_URL}" >> $GITHUB_OUTPUT
          echo "Amplify job ID: ${JOB_ID}"

      - name: Upload build to Amplify
        run: |
          curl -T frontend-build.zip \
            -H "Content-Type: application/zip" \
            "${{ steps.amplify-deployment.outputs.upload_url }}"

      - name: Start Amplify deployment
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
          AMPLIFY_BRANCH: ${{ vars.AMPLIFY_BRANCH || 'main' }}
        run: |
          aws amplify start-deployment \
            --app-id "${AMPLIFY_APP_ID}" \
            --branch-name "${AMPLIFY_BRANCH}" \
            --job-id "${{ steps.amplify-deployment.outputs.job_id }}"

      # Poll until Amplify reports the deployment complete (max ~15 min)
      - name: Wait for deployment to succeed
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
          AMPLIFY_BRANCH: ${{ vars.AMPLIFY_BRANCH || 'main' }}
          JOB_ID:         ${{ steps.amplify-deployment.outputs.job_id }}
        run: |
          echo "Waiting for Amplify deployment ${JOB_ID} to complete..."
          for i in $(seq 1 30); do
            # Sleep before every iteration except the first so the initial
            # check is immediate and we don't waste 30 s on fast deploys.
            [ "$i" -gt 1 ] && sleep 30

            STATUS=$(aws amplify get-job \
              --app-id "${AMPLIFY_APP_ID}" \
              --branch-name "${AMPLIFY_BRANCH}" \
              --job-id "${JOB_ID}" \
              --query 'job.summary.status' \
              --output text)

            echo "Attempt ${i}/30 - status: ${STATUS}"

            case "${STATUS}" in
              SUCCEED)
                echo "✅ Amplify deployment succeeded"
                exit 0 ;;
              FAILED|CANCELLED)
                echo "❌ Amplify deployment ${STATUS}"
                exit 1 ;;
            esac
          done

          echo "❌ Timed out waiting for Amplify deployment"
          exit 1

      # Invalidate CloudFront cache after Amplify deployment
      # SSR pages: invalidate all. Static assets: no invalidation needed (content-hashed).
      - name: Invalidate CloudFront cache
        if: success() && vars.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "CloudFront invalidation created: ${INVALIDATION_ID}"
          echo "CLOUDFRONT_INVALIDATION_ID=${INVALIDATION_ID}" >> $GITHUB_ENV

      - name: Deployment summary
        if: success()
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
          AMPLIFY_BRANCH: ${{ vars.AMPLIFY_BRANCH || 'main' }}
        run: |
          DOMAIN=$(aws amplify get-branch \
            --app-id "${AMPLIFY_APP_ID}" \
            --branch-name "${AMPLIFY_BRANCH}" \
            --query 'branch.displayName' \
            --output text 2>/dev/null || echo "utubooking.com")
          echo "✅ Frontend deployed to AWS Amplify (${AWS_REGION})"
          echo "   Job: ${{ steps.amplify-deployment.outputs.job_id }}"
          echo "   Branch: ${AMPLIFY_BRANCH}"
          echo "   CloudFront invalidation: ${CLOUDFRONT_INVALIDATION_ID:-N/A}"

